<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:italic,wght@0,700;1,700&family=Inter:wght@300&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f4f7f4; color: #2d4a2d; }
        .font-serif { font-family: 'Playfair Display', serif; }
    </style>
</head>
<body class="bg-[#e2734d] text-white flex items-center justify-center min-h-screen text-center p-8">
    <div class="border-l border-r border-white/30 px-12 py-20">
        <p class="text-[10px] uppercase tracking-[0.8em] mb-10">Wedding Day</p>
        <h1 class="text-5xl font-serif lowercase mb-4">{{ data.groom_name }}</h1>
        <span class="text-xl">+</span>
        <h1 class="text-5xl font-serif lowercase mt-4">{{ data.bride_name }}</h1>
    </div>
</body>
</html>
