<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:italic,wght@0,700;1,700&family=Inter:wght@300&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f4f7f4; color: #2d4a2d; }
        .font-serif { font-family: 'Playfair Display', serif; }
    </style>
</head>
<body class="bg-[#0a192f] text-[#e6f1ff] flex items-center justify-center min-h-screen font-serif text-center">
    <div class="border-4 border-[#64ffda]/20 p-16 rounded-lg outline outline-1 outline-[#64ffda] outline-offset-8">
        <h2 class="text-6xl font-bold mb-4">{{ data.groom_name }}</h2>
        <div class="text-[#64ffda] text-3xl my-4">❆</div>
        <h2 class="text-6xl font-bold mb-8">{{ data.bride_name }}</h2>
        <p class="tracking-[0.5em] text-sm text-[#8892b0]">EXCLUSIVELY INVITED</p>
    </div>
</body>
</html>
