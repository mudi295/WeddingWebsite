<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding | {{ data.groom_name }} & {{ data.bride_name }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;500&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #fcfaf7; color: #333; }
        .font-serif { font-family: 'Cormorant Garamond', serif; }
        .line-animation {
            height: 100px;
            width: 1px;
            background-color: #333;
            margin: 0 auto;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center text-center p-8">
    
    <div class="mb-16 space-y-4">
        <p class="text-[10px] tracking-[0.4em] uppercase font-light text-gray-500">Invitation</p>
        <div class="line-animation"></div>
    </div>

    <div class="mb-20">
        <h1 class="font-serif text-5xl md:text-7xl font-light tracking-tight mb-4">
            {{ data.groom_name }} <span class="text-xl align-middle italic text-gray-400 mx-4">and</span> {{ data.bride_name }}
        </h1>
        <p class="text-gray-400 font-light text-sm italic mt-6">Kami mengundang Anda untuk merayakan hari bahagia kami.</p>
    </div>

    <div class="grid grid-cols-3 gap-4 w-full max-w-xs border-y border-gray-200 py-6 mb-12">
        <div class="text-center border-r border-gray-100">
            <p class="text-[9px] uppercase tracking-widest text-gray-400 mb-1">Date</p>
            <p class="text-xs font-medium">12.12.26</p>
        </div>
        <div class="text-center border-r border-gray-100">
            <p class="text-[9px] uppercase tracking-widest text-gray-400 mb-1">Time</p>
            <p class="text-xs font-medium">09:00 AM</p>
        </div>
        <div class="text-center">
            <p class="text-[9px] uppercase tracking-widest text-gray-400 mb-1">Place</p>
            <p class="text-xs font-medium">Jakarta</p>
        </div>
    </div>

    <div class="space-y-6">
        <div class="line-animation"></div>
        <p class="text-[9px] tracking-[0.5em] uppercase font-bold text-gray-800">Wedding.ID</p>
    </div>

</body>
</html>
