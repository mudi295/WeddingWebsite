<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:italic,wght@0,700;1,700&family=Inter:wght@300&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f4f7f4; color: #2d4a2d; }
        .font-serif { font-family: 'Playfair Display', serif; }
    </style>
</head>
<body class="bg-[#f2e8cf] text-[#386641] flex items-center justify-center min-h-screen font-mono p-10">
    <div class="border-2 border-dashed border-[#bc4749] p-10 text-center max-w-sm bg-[url('https://www.transparenttextures.com/patterns/old-mathematics.png')]">
        <p class="mb-6 uppercase border-b border-[#bc4749] inline-block">Official Announcement</p>
        <h1 class="text-4xl font-black mb-2">{{ data.groom_name }}</h1>
        <p class="text-xl">JOINING WITH</p>
        <h1 class="text-4xl font-black mt-2">{{ data.bride_name }}</h1>
        <p class="mt-10 text-xs italic">"Two souls, one heart."</p>
    </div>
</body>
</html>
